name: Ayaka Backend CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup environment Go compiler
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Match to your Go version
          cache: true

      # 3. Download dependencies
      - name: Install Dependencies
        run: go mod download

      # 4. Run Unit Test
      - name: Run Unit Tests
        env:
          # Server
          SERVER_PORT: '8000'

          # Database Configuration (Aman karena testing kita pakai SQLite)
          DATABASE_HOST: 'localhost'
          DATABASE_PORT: '5432'
          DATABASE_USER: 'postgres'
          DATABASE_PASS: 'password'
          DATABASE_NAME: 'ayaka_db'

          # JWT Configuration
          JWT_ACCESS_SECRET: 'ACCESS_SECRET_KEY'
          JWT_ACCESS_EXPIRED: '24'
          JWT_REFRESH_SECRET: 'REFRESH_SECRET_KEY'
          JWT_REFRESH_EXPIRED: '10080'

          # Frontend Config
          FRONTEND_URL: 'http://localhost:3000'

          # SMTP Configuration
          SMTP_HOST: 'smtp.gmail.com'
          SMTP_PORT: '587'
          SMTP_USER: 'your@mail.com'
          SMTP_PASS: 'YOURPASSWORD'
        run: go test -v -coverprofile=coverage.txt ./...