version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ayaka_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ayaka_network

  app:
    build: .
    container_name: ayaka_backend
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    env_file:
      - .env             
    environment:
      - DATABASE_HOST=db
    depends_on:
      - db
    networks:
      - ayaka_network

volumes:
  postgres_data:

networks:
  ayaka_network: